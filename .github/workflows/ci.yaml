name: gomacs-ci

on:
  push:
    branches:
      - '**'
  pull_request:

permissions:
  contents: read

env:
  GOVULNCHECK_VERSION: v1.3.0

jobs:
  fmt:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: gomacs-setup-go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'

      - name: gomacs-fmt-check
        run: |
          make fmt
          if ! git diff --exit-code; then
            echo "::error::Files are not formatted. Run 'make fmt' and commit the result."
            exit 1
          fi

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: gomacs-setup-go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'

      - name: gomacs-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2

  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: gomacs-setup-go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'

      - name: gomacs-cache-govulncheck
        uses: actions/cache@v4
        with:
          path: ~/go/bin/govulncheck
          key: govulncheck-${{ runner.os }}-${{ env.GOVULNCHECK_VERSION }}

      - name: gomacs-install-govulncheck
        run: |
          if [ ! -x "$(go env GOPATH)/bin/govulncheck" ]; then
            go install golang.org/x/vuln/cmd/govulncheck@${GOVULNCHECK_VERSION}
          fi

      - name: gomacs-coverage
        run: make coverage

      - name: gomacs-vulncheck
        run: make vulncheck

      - name: gomacs-build
        run: make build
